<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Connection Quest Intro</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Unbounded:wght@600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="Welcome.css">
</head>
<body>
	<div class="film-grain" aria-hidden="true"></div>
	<div class="vignette" aria-hidden="true"></div>

	<main class="intro-page">
		<section class="mono-stage">
			<div class="corner-mark corner-mark-top-left" aria-hidden="true"></div>
			<div class="corner-mark corner-mark-top-right" aria-hidden="true"></div>
			<div class="corner-mark corner-mark-bottom-left" aria-hidden="true"></div>
			<div class="corner-mark corner-mark-bottom-right" aria-hidden="true"></div>

			<header class="stage-header">
				<p class="stage-label">Intro Sequence</p>
				<p class="stage-index">01 / CQ</p>
			</header>

			<div class="hero-stack">
				<div class="title-block">
					<p class="lead-tag">Anonymous web craft</p>
					<p id="intro-prefix" class="intro-prefix">Welcome to</p>
					<h1 id="main-title" class="main-title" data-text="Connection Quest" aria-label="Connection Quest"></h1>
					<p id="credit-line" class="credit-line" data-text="made by Light and Frieren" aria-label="made by Light and Frieren"></p>
					<p class="manifest-copy">
						Wir sind direkt unter euch
					</p>
				</div>

				<div class="info-ribbon" aria-label="Intro Informationen">
					<div class="ribbon-item">
						<p class="info-label">Studio</p>
						<p class="info-value">Light and Frieren</p>
					</div>
					<div class="ribbon-item">
						<p class="info-label">Mood</p>
						<p class="info-value">Black and White</p>
					</div>
					<div class="ribbon-item ribbon-item-wide">
						<p class="info-label">Statement</p>
						<p class="info-copy">Die ungefilterte Wahrheit</p>
					</div>
				</div>
			</div>

			<div class="stage-footer">
				<p id="status-line" class="status-line">letters incoming</p>
				<div class="action-row">
					<a id="enter-link" class="enter-link is-locked" href="ConnectionQuest.html" aria-disabled="true">Enter Connection Quest</a>
					<a class="ghost-link" href="index.html">Ranking</a>
				</div>
			</div>
		</section>
	</main>

	<script src="Welcome.js"></script>
</body>
</html>
